<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111111;
      --surface:   #1a1a1a;
      --border:    #2e2e2e;
      --text:      #f0f0f0;
      --muted:     #888888;
      --primary:   #FFD200;
      --primary-h: #e6bd00;
      --danger:    #ff5555;
      --match-bg:  rgba(255, 210, 0, 0.18);

      --c-key:  #c084fc;
      --c-str:  #4ade80;
      --c-num:  #60a5fa;
      --c-bool: #fb923c;
      --c-null: #f87171;
      --c-bkt:  #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #000;
      border-bottom: 3px solid var(--primary);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; color: var(--primary); }
    .badge {
      background: var(--primary);
      color: #111;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Shared panel styles ── */
    .panel-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .panel-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-right: 4px;
    }

    /* ── Buttons ── */
    button {
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, border-color 0.1s;
      line-height: 1.5;
    }
    button:hover { background: var(--bg); }
    button.primary { background: var(--primary); border-color: var(--primary); color: #111; }
    button.primary:hover { background: var(--primary-h); border-color: var(--primary-h); }
    button.danger-btn { color: var(--danger); border-color: #5a2020; }
    button.danger-btn:hover { background: #2a1111; }

    /* ── Input panel ── */
    .input-panel {
      width: 42%;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      border-right: 2px solid var(--border);
      background: var(--surface);
      transition: width 0.2s ease, min-width 0.2s ease;
    }
    .input-panel.collapsed {
      width: 36px;
      min-width: 36px;
      overflow: hidden;
    }
    .input-panel.collapsed .panel-bar > *:not(#collapse-btn) { display: none; }
    .input-panel.collapsed textarea,
    .input-panel.collapsed .error-bar { display: none; }
    #collapse-btn { margin-left: auto; flex-shrink: 0; }
    textarea {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 12.5px;
      padding: 12px 14px;
      color: var(--text);
      background: var(--surface);
      line-height: 1.65;
      tab-size: 2;
    }
    .error-bar {
      display: none;
      background: #2a1111;
      border-top: 1px solid #5a2020;
      padding: 6px 14px;
      font-size: 11.5px;
      color: var(--danger);
      font-family: Consolas, monospace;
      word-break: break-word;
    }
    .error-bar.show { display: block; }

    /* ── Output panel ── */
    .output-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }
    .output-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 120px;
      max-width: 260px;
    }
    .search-wrap svg {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 4px 10px 4px 28px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: var(--bg);
      color: var(--text);
    }
    .search-wrap input:focus { border-color: var(--primary); background: #222; }

    .spacer-auto { flex: 1; }
    .stats {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Tree ── */
    .tree-wrap {
      flex: 1;
      overflow: auto;
      padding: 10px 14px 20px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.8;
    }

    .node { position: relative; }

    .node-row {
      display: flex;
      align-items: baseline;
      gap: 3px;
      padding: 0 3px;
      border-radius: 4px;
      min-height: 24px;
    }
    .node-row:hover { background: #222200; }
    .node-row.match { background: var(--match-bg) !important; }

    .toggle {
      width: 18px;
      height: 18px;
      min-width: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 9px;
      border-radius: 3px;
      user-select: none;
      border: none;
      background: transparent;
      padding: 0;
      transition: color 0.1s;
      align-self: center;
    }
    .toggle:hover { background: var(--border); color: var(--text); }

    .spacer {
      width: 18px;
      min-width: 18px;
      display: inline-block;
    }

    .key   { color: var(--c-key); font-weight: 500; }
    .colon { color: var(--muted); }
    .val-str  { color: var(--c-str); }
    .val-num  { color: var(--c-num); }
    .val-bool { color: var(--c-bool); }
    .val-null { color: var(--c-null); font-style: italic; }
    .bracket  { color: var(--c-bkt); }
    .summary  { color: var(--muted); font-size: 11px; }

    .val-str, .val-num, .val-bool, .val-null {
      cursor: pointer;
      border-radius: 3px;
      padding: 0 2px;
    }
    .val-str:hover, .val-num:hover, .val-bool:hover, .val-null:hover {
      outline: 1px solid currentColor;
      opacity: 0.85;
    }

    .children {
      margin-left: 10px;
      border-left: 1px dashed var(--border);
      padding-left: 8px;
    }

    .copy-path-btn {
      opacity: 0;
      font-size: 10px;
      padding: 1px 6px;
      margin-left: 3px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.12s;
      font-family: inherit;
      line-height: 1.6;
      align-self: center;
    }
    .node-row:hover .copy-path-btn { opacity: 1; }
    .copy-path-btn:hover { background: var(--primary-h); }

    /* ── Placeholder ── */
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 10px;
      font-family: inherit;
    }
    .placeholder svg { opacity: 0.25; }
    .placeholder p { font-size: 14px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 18px;
      right: 18px;
      background: var(--primary);
      color: #111;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12.5px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      z-index: 999;
      max-width: 320px;
      word-break: break-all;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>JSON Viewer</h1>
  <span class="badge">QA Tool</span>
</header>

<div class="main">

  <!-- Input panel -->
  <div class="input-panel">
    <div class="panel-bar">
      <span class="panel-label">Input</span>
      <button class="primary" onclick="doFormat()">Format</button>
      <button onclick="doMinify()">Minify</button>
      <button onclick="doClear()" class="danger-btn">Clear</button>
      <button id="collapse-btn" onclick="toggleInput()" title="Collapse input panel">◀</button>
    </div>
    <textarea id="input"
      placeholder="Paste JSON here, or drag & drop a .json file…"
      spellcheck="false"
      oninput="scheduleRender()"></textarea>
    <div class="error-bar" id="error-bar"></div>
  </div>

  <!-- Output panel -->
  <div class="output-panel">
    <div class="output-bar">
      <div class="search-wrap">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search keys or values…" oninput="doSearch(this.value)">
      </div>
      <button onclick="doExpandAll()">Expand All</button>
      <button onclick="doCollapseAll()">Collapse All</button>
      <button onclick="doCopyJSON()">Copy JSON</button>
      <div class="spacer-auto"></div>
      <span class="stats" id="stats"></span>
    </div>
    <div class="tree-wrap" id="tree">
      <div class="placeholder">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
          <path d="M8 12h.01M12 12h.01M16 12h.01"/>
        </svg>
        <p>Paste JSON on the left to get started</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const inputEl  = document.getElementById('input');
  const treeEl   = document.getElementById('tree');
  const errorBar = document.getElementById('error-bar');
  const statsEl  = document.getElementById('stats');
  const searchEl = document.getElementById('search');
  const toastEl  = document.getElementById('toast');

  let parsedData = null;
  let renderTimer = null;

  // ── Render scheduling ──────────────────────────────────────────────

  function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(() => {
      const raw = inputEl.value.trim();
      if (!raw) { clearOutput(); return; }
      tryRender(raw);
    }, 350);
  }

  function tryRender(text) {
    try {
      parsedData = JSON.parse(text);
      hideError();
      renderTree(parsedData);
      statsEl.textContent = getStats(parsedData);
    } catch (e) {
      showError(e.message);
      parsedData = null;
      statsEl.textContent = '';
    }
  }

  function clearOutput() {
    parsedData = null;
    statsEl.textContent = '';
    hideError();
    treeEl.innerHTML = `<div class="placeholder">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        <path d="M8 12h.01M12 12h.01M16 12h.01"/>
      </svg>
      <p>Paste JSON on the left to get started</p>
    </div>`;
  }

  // ── Actions ────────────────────────────────────────────────────────

  function doFormat() {
    const raw = inputEl.value.trim();
    if (!raw) return;
    try {
      parsedData = JSON.parse(raw);
      inputEl.value = JSON.stringify(parsedData, null, 2);
      hideError();
      renderTree(parsedData);
      statsEl.textContent = getStats(parsedData);
    } catch (e) { showError(e.message); }
  }

  function doMinify() {
    const raw = inputEl.value.trim();
    if (!raw) return;
    try {
      parsedData = JSON.parse(raw);
      inputEl.value = JSON.stringify(parsedData);
      hideError();
      renderTree(parsedData);
      statsEl.textContent = getStats(parsedData);
    } catch (e) { showError(e.message); }
  }

  function doClear() {
    inputEl.value = '';
    searchEl.value = '';
    clearOutput();
  }

  function doCopyJSON() {
    if (!parsedData && !inputEl.value.trim()) return;
    const text = parsedData ? JSON.stringify(parsedData, null, 2) : inputEl.value.trim();
    navigator.clipboard.writeText(text).then(() => toast('Copied formatted JSON'));
  }

  function doExpandAll() {
    treeEl.querySelectorAll('.toggle').forEach(t => {
      if (t.textContent === '▶') t.click();
    });
  }

  function doCollapseAll() {
    treeEl.querySelectorAll('.toggle').forEach(t => {
      if (t.textContent === '▼') t.click();
    });
  }

  function doSearch(q) {
    if (!parsedData) return;
    const term = q.trim().toLowerCase();

    // Clear previous matches
    treeEl.querySelectorAll('.node-row.match').forEach(r => r.classList.remove('match'));

    if (!term) return;

    // Expand everything first so hidden rows are searchable
    doExpandAll();

    treeEl.querySelectorAll('.node-row').forEach(row => {
      const keyEl  = row.querySelector('.key');
      const valEl  = row.querySelector('[data-value]');
      const keyHit = keyEl?.dataset.key?.toLowerCase().includes(term);
      const valHit = valEl?.dataset.value?.toLowerCase().includes(term);
      if (keyHit || valHit) row.classList.add('match');
    });
  }

  // ── Tree rendering ─────────────────────────────────────────────────

  function renderTree(data) {
    treeEl.innerHTML = '';
    treeEl.appendChild(buildNode(data, '', null));
    const q = searchEl.value.trim();
    if (q) doSearch(q);
  }

  function buildNode(value, path, key) {
    const wrapper = document.createElement('div');
    wrapper.className = 'node';
    if (path) wrapper.dataset.path = path;

    const isNull    = value === null;
    const isComplex = !isNull && typeof value === 'object';

    if (!isComplex) {
      wrapper.appendChild(makePrimRow(value, path, key));
      return wrapper;
    }

    const isArr    = Array.isArray(value);
    const entries  = Object.entries(value);
    const openCh   = isArr ? '[' : '{';
    const closeCh  = isArr ? ']' : '}';
    const itemWord = isArr ? 'item' : 'key';

    // Header row
    const header = document.createElement('div');
    header.className = 'node-row';

    const toggle = document.createElement('button');
    toggle.className = 'toggle';
    toggle.textContent = '▼';
    toggle.title = 'Collapse';
    header.appendChild(toggle);

    if (key !== null && key !== undefined) {
      const keyEl = document.createElement('span');
      keyEl.className = 'key';
      keyEl.textContent = `"${key}"`;
      keyEl.dataset.key = key;
      header.appendChild(keyEl);
      header.appendChild(mkSpan('colon', ':'));
    }

    header.appendChild(mkSpan('bracket', openCh));

    const summary = document.createElement('span');
    summary.className = 'summary';
    summary.textContent = ` … ${entries.length} ${itemWord}${entries.length !== 1 ? 's' : ''} `;
    summary.style.display = 'none';
    header.appendChild(summary);

    const inlineClose = document.createElement('span');
    inlineClose.className = 'bracket';
    inlineClose.textContent = closeCh;
    inlineClose.style.display = 'none';
    header.appendChild(inlineClose);

    if (path) header.appendChild(makeCopyPathBtn(path));
    wrapper.appendChild(header);

    // Children
    const childrenEl = document.createElement('div');
    childrenEl.className = 'children';

    entries.forEach(([k, v]) => {
      const childPath = isArr
        ? (path ? `${path}[${k}]` : `[${k}]`)
        : (path ? `${path}.${k}` : k);
      childrenEl.appendChild(buildNode(v, childPath, isArr ? null : k));
    });
    wrapper.appendChild(childrenEl);

    // Footer row
    const footer = document.createElement('div');
    footer.className = 'node-row footer-row';
    footer.appendChild(mkSpan('bracket', closeCh));
    wrapper.appendChild(footer);

    // Toggle logic
    let expanded = true;
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      expanded = !expanded;
      toggle.textContent = expanded ? '▼' : '▶';
      toggle.title = expanded ? 'Collapse' : 'Expand';
      childrenEl.style.display  = expanded ? '' : 'none';
      footer.style.display      = expanded ? '' : 'none';
      summary.style.display     = expanded ? 'none' : '';
      inlineClose.style.display = expanded ? 'none' : '';
    });

    return wrapper;
  }

  function makePrimRow(value, path, key) {
    const row = document.createElement('div');
    row.className = 'node-row';
    if (path) row.dataset.path = path;

    // Spacer aligns with toggle button
    const spacer = document.createElement('span');
    spacer.className = 'spacer';
    row.appendChild(spacer);

    if (key !== null && key !== undefined) {
      const keyEl = document.createElement('span');
      keyEl.className = 'key';
      keyEl.textContent = `"${key}"`;
      keyEl.dataset.key = key;
      row.appendChild(keyEl);
      row.appendChild(mkSpan('colon', ':'));
    }

    const valEl = document.createElement('span');
    let rawVal;

    if (value === null) {
      valEl.className = 'val-null';
      valEl.textContent = 'null';
      rawVal = 'null';
    } else if (typeof value === 'boolean') {
      valEl.className = 'val-bool';
      valEl.textContent = String(value);
      rawVal = String(value);
    } else if (typeof value === 'number') {
      valEl.className = 'val-num';
      valEl.textContent = String(value);
      rawVal = String(value);
    } else {
      valEl.className = 'val-str';
      valEl.textContent = `"${value}"`;
      rawVal = String(value);
    }

    valEl.dataset.value = rawVal;
    valEl.title = 'Click to copy value';
    valEl.addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(rawVal).then(() => {
        const display = rawVal.length > 40 ? rawVal.slice(0, 40) + '…' : rawVal;
        toast(`Copied value: ${display}`);
      });
    });

    row.appendChild(valEl);
    if (path) row.appendChild(makeCopyPathBtn(path));
    return row;
  }

  function makeCopyPathBtn(path) {
    const btn = document.createElement('button');
    btn.className = 'copy-path-btn';
    btn.textContent = 'copy path';
    btn.title = path;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(path).then(() => toast(`Copied path: ${path}`));
    });
    return btn;
  }

  function mkSpan(cls, text) {
    const s = document.createElement('span');
    s.className = cls;
    s.textContent = text;
    return s;
  }

  // ── Stats ──────────────────────────────────────────────────────────

  function getStats(data) {
    const c = { keys: 0, str: 0, num: 0, bool: 0, nil: 0 };
    walk(data, c);
    const parts = [`${c.keys} key${c.keys !== 1 ? 's' : ''}`];
    if (c.str)  parts.push(`${c.str} str`);
    if (c.num)  parts.push(`${c.num} num`);
    if (c.bool) parts.push(`${c.bool} bool`);
    if (c.nil)  parts.push(`${c.nil} null`);
    return parts.join(' · ');
  }

  function walk(val, c) {
    if (val === null)            { c.nil++;  return; }
    if (typeof val === 'boolean'){ c.bool++; return; }
    if (typeof val === 'number') { c.num++;  return; }
    if (typeof val === 'string') { c.str++;  return; }
    if (typeof val === 'object') {
      Object.values(val).forEach(v => { c.keys++; walk(v, c); });
    }
  }

  // ── Error / Toast ──────────────────────────────────────────────────

  function showError(msg) {
    errorBar.textContent = `⚠ ${msg}`;
    errorBar.classList.add('show');
  }
  function hideError() { errorBar.classList.remove('show'); }

  let toastTimer;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  // ── Drag & drop ────────────────────────────────────────────────────

  inputEl.addEventListener('dragover', e => e.preventDefault());
  inputEl.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      inputEl.value = ev.target.result;
      tryRender(ev.target.result);
    };
    reader.readAsText(file);
  });

  // ── Input panel collapse ───────────────────────────────────────────

  function toggleInput() {
    const panel = document.querySelector('.input-panel');
    const btn   = document.getElementById('collapse-btn');
    const collapsed = panel.classList.toggle('collapsed');
    btn.textContent = collapsed ? '▶' : '◀';
    btn.title = collapsed ? 'Expand input panel' : 'Collapse input panel';
  }

  // ── Keyboard shortcut: Ctrl/Cmd+Enter → Format ─────────────────────
  inputEl.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      doFormat();
    }
  });
</script>
</body>
</html>
